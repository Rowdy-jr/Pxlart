<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PXLmoon | Digital Suite</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden; 
            background-color: #050514; /* Fallback dark color just in case */
        }

        #vanta-bg {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1; 
        }

        .ui-layer {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 1; 
        }

        .logo {
            position: absolute;
            top: 30px;
            left: 30px;
            height: 80px; 
            filter: drop-shadow(0 0 15px rgba(142, 245, 238, 0.6));
        }

        .button-group {
            position: absolute;
            top: 50%;
            left: 40px;
            transform: translateY(-50%); 
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .nav-btn {
            padding: 16px 32px;
            background: rgba(10, 10, 25, 0.8); 
            border: 2px solid #8ef5ee; 
            color: #8ef5ee; 
            font-size: 18px;
            font-weight: 800; 
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px; 
            transition: all 0.2s ease;
            text-align: left;
            box-shadow: 0 0 10px rgba(142, 245, 238, 0.2); 
            text-shadow: 0 0 5px rgba(142, 245, 238, 0.5); 
            text-transform: uppercase;
        }

        .nav-btn:hover {
            background: rgba(142, 245, 238, 0.15);
            border-color: #ffffff;
            color: #ffffff;
            transform: translateX(15px); 
            box-shadow: 0 0 20px rgba(142, 245, 238, 0.8), inset 0 0 10px rgba(142, 245, 238, 0.4); 
            text-shadow: 0 0 8px #ffffff;
        }

        .copyright {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="vanta-bg"></div>

    <div class="ui-layer">
        
        <img src="Pxlmoon.png" alt="PXLmoon Logo" class="logo">

        <div class="button-group">
            <button class="nav-btn">Document Tools</button>
            <button class="nav-btn">Passport Gen</button>
            <button class="nav-btn">System Settings</button>
        </div>

        <div class="copyright">
            &copy; 2026 PXLMOON. ALL RIGHTS RESERVED.
        </div>

    </div>

    <script src="three.r134.min.js"></script>
    <script src="vanta.fog.min.js"></script>
    <script>
        VANTA.FOG({
          el: "#vanta-bg",
          mouseControls: true,
          touchControls: true,
          gyroControls: false,
          minHeight: 200.00,
          minWidth: 200.00,
          highlightColor: 0x8ef5ee, 
          midtoneColor: 0x1a0b2e,   
          lowlightColor: 0x050514,  
          baseColor: 0x0a0a1a,      
          speed: 0.30,
          zoom: 0.60
        })
    </script>
</body>
</html>
